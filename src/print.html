<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kids RPG Chore Dashboard — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Press+Start+2P&family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  * { box-sizing: border-box; }

  .print-shell { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 24px 0; }
  .page-wrap { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

  @page { size: A4 portrait; margin: 0; }
  @media print {
    html, body { background: #fff; }
    .print-shell { gap: 0; padding: 0; }
    .page-wrap { box-shadow: none; break-after: page; page-break-after: always; }
    .page-wrap:last-child { break-after: auto; page-break-after: auto; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div id="root"></div>


<script defer src="print.js"></script>
</body>
</html>
