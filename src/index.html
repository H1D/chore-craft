<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Kids RPG Chore Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Press+Start+2P&family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; padding-top: 56px; }
  * { box-sizing: border-box; }

  /* Single-artboard stage: A4 sheet, centered, with subtle drop shadow. */
  .cc-stage {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px 48px;
    min-height: calc(100vh - 56px);
  }
  .cc-artboard {
    width: 794px;
    height: 1123px;
    background: #fff;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    overflow: hidden;
    position: relative;
  }

  /* Print: only the A4 artboard is visible; toolbar is suppressed in
     toolbar.tsx. Body padding/scaling stripped so the sheet fills the page. */
  @page { size: A4 portrait; margin: 0; }
  @media print {
    html, body { background: #fff; padding: 0; margin: 0; }
    body { padding-top: 0; }
    .cc-stage { padding: 0; min-height: 0; display: block; }
    .cc-artboard { box-shadow: none; }
  }
</style>
</head>
<body>
<div id="root"></div>


<script defer src="main.js"></script>
</body>
</html>
